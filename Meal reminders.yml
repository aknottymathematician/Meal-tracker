name: Meal Reminders

on:
  schedule:
    # Run every 30 min to catch each meal slot (IST = UTC+5:30)
    - cron: '0,30 * * * *'
  workflow_dispatch:   # allow manual trigger for testing

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests PyJWT cryptography
      - name: Send meal reminders
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          TWILIO_ACCOUNT_SID:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:    ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          P1_WHATSAPP:          ${{ secrets.P1_WHATSAPP }}
          P2_WHATSAPP:          ${{ secrets.P2_WHATSAPP }}
        run: python reminders.py
