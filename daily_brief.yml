name: Daily Plan Brief

on:
  schedule:
    # 13:00 UTC = 18:30 IST every day
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  daily-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests PyJWT cryptography
      - name: Send daily plan brief
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          TWILIO_ACCOUNT_SID:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:    ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          P1_WHATSAPP:          ${{ secrets.P1_WHATSAPP }}
          P2_WHATSAPP:          ${{ secrets.P2_WHATSAPP }}
        run: python daily_brief.py
